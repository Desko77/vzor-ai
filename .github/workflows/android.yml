name: Android CI

on:
  push:
    branches: [ main, 'claude/*' ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew lint
        env:
          GITHUB_USER: ${{ secrets.META_SDK_USER }}
          GITHUB_TOKEN: ${{ secrets.META_SDK_TOKEN }}

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew test
        env:
          GITHUB_USER: ${{ secrets.META_SDK_USER }}
          GITHUB_TOKEN: ${{ secrets.META_SDK_TOKEN }}

  build:
    name: Debug Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew assembleDebug
        env:
          GITHUB_USER: ${{ secrets.META_SDK_USER }}
          GITHUB_TOKEN: ${{ secrets.META_SDK_TOKEN }}

  release-check:
    name: Release Build (ProGuard)
    runs-on: ubuntu-latest
    needs: [ lint, test ]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew assembleRelease
        env:
          GITHUB_USER: ${{ secrets.META_SDK_USER }}
          GITHUB_TOKEN: ${{ secrets.META_SDK_TOKEN }}
